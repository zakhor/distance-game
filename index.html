<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>距離感くらいしす！</title>
<meta name="description" content="相手とのちょうどいい距離を探すゲーム" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="T.Y. Lab" />
<meta property="og:title" content="距離感くらいしす！" />
<meta property="og:description" content="相手とのちょうどいい距離を探すゲーム" />
<meta property="og:url" content="https://distance-game.ty-lab.net/" />
<meta property="og:image" content="https://distance-game.ty-lab.net/ogp.png" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #374151;
    --track: #d1d5db;
    --cpu: #111827;
    --player: #2563eb;
    --fit: #15803d;
    --nofit: #b91c1c;
    --warning: #d97706;
    --tolerance: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .wrap {
    max-width: 1320px;
    margin: 0 auto;
    padding: 20px;
  }
  h1 {
    margin: 0 0 16px;
    font-size: 24px;
  }
  h1 .subtitle {
    display: inline-block;
    margin-left: 12px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
  }
  .rules {
    margin: 0 0 16px;
    padding-left: 1.4em;
    color: var(--muted);
    line-height: 1.6;
  }
  .rules li + li { margin-top: 3px; }
  .card {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 12px;
  }
  .label {
    font-size: 12px;
    color: var(--muted);
  }
  .value {
    margin-top: 4px;
    font-size: 20px;
    font-weight: 700;
  }
  .board-shell {
    position: relative;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 4px;
    padding: 8px;
  }
  #board {
    --track-y: 134px;
    position: relative;
    width: 100%;
    height: 170px;
    overflow: hidden;
    border-radius: 0;
    background: transparent;
    cursor: crosshair;
    user-select: none;
  }
  #track {
    position: absolute;
    left: 0;
    width: 100%;
    top: var(--track-y);
    height: 2px;
    background: var(--track);
    transform: translateY(-50%);
    pointer-events: none;
  }
  #measureBand {
    position: absolute;
    top: calc(var(--track-y) - 5px);
    height: 10px;
    border-radius: 999px;
    background: rgba(37,99,235,.18);
    pointer-events: none;
    display: none;
    transition: left .42s cubic-bezier(.22, 1, .36, 1), width .42s cubic-bezier(.22, 1, .36, 1);
  }
  #toleranceBand {
    position: absolute;
    top: 12px;
    bottom: 12px;
    height: auto;
    background: rgba(21,128,61,.14);
    border: 1px dashed rgba(21,128,61,.68);
    pointer-events: none;
    display: none;
    z-index: 2;
  }
  #toleranceBand::before {
    content: "前回";
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--fit);
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }
  #toleranceBand::after {
    content: "";
    position: absolute;
    top: -12px;
    bottom: -12px;
    left: 50%;
    height: auto;
    border-left: 1px dashed rgba(21,128,61,.68);
    transform: translateX(-50%);
  }
  .person {
    position: absolute;
    top: var(--track-y);
    width: 40px;
    height: 0;
    /* 人物の基準点を足元にし、数直線と一致させる。 */
    transform: translateX(-50%);
    z-index: 3;
    pointer-events: none;
  }
  .person::after {
    content: attr(data-label);
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text);
    white-space: nowrap;
    font-size: 12px;
    font-weight: 700;
  }
  .person svg {
    position: absolute;
    left: 50%;
    bottom: -6px;
    width: 34px;
    height: 54px;
    transform: translateX(-50%);
    stroke: currentColor;
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.18));
  }
  #aimArrow {
    position: absolute;
    top: calc(var(--track-y) - 34px);
    left: 0;
    width: 26px;
    height: 34px;
    transform: translateX(-50%);
    z-index: 4;
    pointer-events: none;
    display: none;
    color: #0f766e;
    filter: drop-shadow(0 3px 8px rgba(15,118,110,.22));
  }
  #aimArrow::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    width: 3px;
    height: 24px;
    border-radius: 999px;
    background: currentColor;
    transform: translateX(-50%);
  }
  #aimArrow::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid currentColor;
    transform: translateX(-50%);
  }
  #aimPerson {
    color: var(--player);
    display: none;
    opacity: .48;
    z-index: 4;
  }
  #cpu {
    color: var(--cpu);
  }
  #cpu .arms-raised,
  #cpu .arms-touch {
    display: none;
  }
  #cpu.pose-fit .arms-default,
  #cpu.pose-touch .arms-default {
    display: none;
  }
  #cpu.pose-fit .arms-raised,
  #cpu.pose-touch .arms-touch {
    display: block;
  }
  #player {
    color: var(--player);
    display: none;
    transition: left .42s cubic-bezier(.22, 1, .36, 1);
  }
  #result {
    position: absolute;
    left: 50%;
    top: 18px;
    transform: translateX(-50%);
    display: none;
    padding: 10px 16px;
    border: 2px solid rgba(17,24,39,.85);
    border-radius: 4px;
    color: #fff;
    font-weight: 800;
    letter-spacing: 0;
    z-index: 5;
    box-shadow: none;
  }
  #turnIndicator {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 5;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    pointer-events: none;
  }
  .fit { background: var(--fit); }
  .nofit { background: var(--nofit); }
  .warning { background: var(--warning); }
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  button {
    appearance: none;
    border: 2px solid var(--border);
    border-radius: 4px;
    background: #fff;
    padding: 10px 14px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #f9fafb; }
  #resetBtn:hover {
    background: var(--text);
    color: #fff;
  }
  .mode-switcher {
    display: inline-flex;
    align-items: stretch;
  }
  .mode-button {
    border-radius: 0;
    margin-left: -2px;
  }
  .mode-button:first-child {
    margin-left: 0;
    border-radius: 4px 0 0 4px;
  }
  .mode-button:last-child { border-radius: 0 4px 4px 0; }
  .mode-button.active {
    position: relative;
    background: var(--text);
    color: #fff;
  }
  .mode-button.active:hover { background: var(--text); }
  #clearModal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: transparent;
    z-index: 40;
    padding: 24px;
  }
  #clearModal.show {
    display: flex;
  }
  .modal-panel {
    width: min(420px, 100%);
    background: #fff;
    border: 2px solid var(--text);
    border-radius: 4px;
    padding: 18px 20px;
    text-align: left;
  }
  .modal-rank {
    margin: 0 0 10px;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
  }
  #clearRank {
    display: inline-block;
    margin-inline: .4em;
    color: #7e22ce;
    font-family: "Noto Sans JP", system-ui, sans-serif;
    font-size: 22px;
    font-weight: 900;
  }
  .modal-turns {
    margin: 0 0 16px;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .modal-actions {
    display: flex;
    align-items: stretch;
    gap: 8px;
  }
  #modalResetBtn,
  #saveResultBtn {
    display: inline-flex;
    align-items: center;
    height: 38px;
    border-color: var(--text);
    border-radius: 4px;
    background: transparent;
    padding: 7px 12px;
  }
  #modalResetBtn:hover,
  #saveResultBtn:hover {
    background: var(--text);
    color: #fff;
  }
  @media (max-width: 720px) {
    .wrap { padding: 12px; }
  }
  @media (max-width: 480px) {
    .modal-rank { font-size: 13px; }
    #clearRank {
      margin-inline: .2em;
      font-size: 16px;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>距離感くらいしす！<span class="subtitle">あなたの距離感、それで合ってる？</span></h1>
  <ul class="rules">
    <li>直線上の位置を指定して、相手の距離感にフィットさせよう</li>
    <li>フィットすれば距離感は近づき、外れると遠ざかる</li>
    <li>最終的にタッチできる距離感まで近づけばクリア</li>
    <li>緑の帯は、前回の距離感を示します</li>
    <li>スマホでは、画面を横向きにしてのプレイを推奨します</li>
  </ul>

  <div class="board-shell">
    <div id="board" aria-label="ゲーム盤">
      <div id="track"></div>
      <div id="toleranceBand"></div>
      <div id="measureBand"></div>
      <div id="aimArrow" aria-hidden="true"></div>
      <div id="aimPerson" class="person" data-label="YOU" aria-hidden="true">
        <svg viewBox="0 0 32 56">
          <circle cx="16" cy="8" r="5"></circle>
          <path d="M16 14v19"></path>
          <path d="M7 23h18"></path>
          <path d="M16 33 8 50"></path>
          <path d="M16 33 24 50"></path>
        </svg>
      </div>
      <div id="turnIndicator">ターン <span id="turn">1</span></div>
      <div id="cpu" class="person" data-label="相手">
        <svg viewBox="0 0 32 56" aria-hidden="true">
          <circle cx="16" cy="8" r="5"></circle>
          <path d="M16 14v19"></path>
          <path class="arms-default" d="M7 23h18"></path>
          <g class="arms-raised">
            <path d="M16 22 7 13"></path>
            <path d="M16 22 25 13"></path>
          </g>
          <g class="arms-touch">
            <path d="M16 22 7 12"></path>
            <path d="M16 22 7 34"></path>
          </g>
          <path d="M16 33 8 50"></path>
          <path d="M16 33 24 50"></path>
        </svg>
      </div>
      <div id="player" class="person" data-label="YOU">
        <svg viewBox="0 0 32 56" aria-hidden="true">
          <circle cx="16" cy="8" r="5"></circle>
          <path d="M16 14v19"></path>
          <path d="M7 23h18"></path>
          <path d="M16 33 8 50"></path>
          <path d="M16 33 24 50"></path>
        </svg>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <div class="controls">
    <button id="resetBtn">リセット</button>
    <div class="mode-switcher" role="group" aria-label="ゲームモード">
      <button class="mode-button active" type="button" data-mode="normal" aria-pressed="true">NORMAL</button>
      <button class="mode-button" type="button" data-mode="hard" aria-pressed="false">HARD</button>
      <button class="mode-button" type="button" data-mode="hell" aria-pressed="false">HELL</button>
    </div>
  </div>
</div>

<div id="clearModal" aria-modal="true" role="dialog" aria-label="クリア結果">
  <div class="modal-panel">
    <p class="modal-rank">あなたは<span id="clearRank">距離感マスター</span>です</p>
    <p class="modal-turns" id="clearTurns">かかったターン：0</p>
    <div class="modal-actions">
      <button id="saveResultBtn">画像をコピー</button>
      <button id="modalResetBtn">OK</button>
    </div>
  </div>
</div>

<script>
(() => {
  const dom = {
    board: document.getElementById('board'),
    track: document.getElementById('track'),
    toleranceBand: document.getElementById('toleranceBand'),
    measureBand: document.getElementById('measureBand'),
    aimArrow: document.getElementById('aimArrow'),
    aimPerson: document.getElementById('aimPerson'),
    cpu: document.getElementById('cpu'),
    player: document.getElementById('player'),
    result: document.getElementById('result'),
    turn: document.getElementById('turn'),
    resetBtn: document.getElementById('resetBtn'),
    modeButtons: [...document.querySelectorAll('.mode-button')],
    saveResultBtn: document.getElementById('saveResultBtn'),
    modalResetBtn: document.getElementById('modalResetBtn'),
    clearModal: document.getElementById('clearModal'),
    clearRank: document.getElementById('clearRank'),
    clearTurns: document.getElementById('clearTurns')
  };

  const CONFETTI_SETTINGS = {
    INITIAL_PARTICLE_COUNT: 24,
    INITIAL_SPREAD: 100,
    INITIAL_GRAVITY: 1.25,
    INITIAL_TICKS: 1000,
    STREAM_PARTICLE_COUNT: 8,
    STREAM_SPREAD: 80,
    STREAM_GRAVITY: 1.25,
    STREAM_TICKS: 1000,
    STREAM_INTERVAL_MS: 100,
    START_VELOCITY: 18,
    DECAY: 0.97,
    Z_INDEX: 30
  };

  const RANKS = [
    { maxTurns: 5, title: '距離感マスター', color: '#7e22ce' },
    { maxTurns: 10, title: '距離感熟練者', color: '#b8860b' },
    { maxTurns: 15, title: '距離感上手', color: '#b91c1c' },
    { maxTurns: 20, title: '距離感見習い', color: '#15803d' },
    { maxTurns: Infinity, title: '距離感初心者', color: '#2563eb' }
  ];

  const MODES = {
    normal: { tooClosePenaltyMultiplier: 2, tooFarPenaltyMultiplier: 1 },
    hard: { tooClosePenaltyMultiplier: 4, tooFarPenaltyMultiplier: 2 },
    hell: { gameOverOnMiss: true }
  };

  const config = {
    initialMinDistance: 4,
    initialMaxDistance: 100,
    maxDistance: 150,
    clearDistanceThreshold: 2,
    toleranceRatio: 0.1,
    minTolerance: 2,
    touchRadiusPx: 18,
    cpuRightPadding: 64,
    resultHideDelayMs: 1350
  };

  const state = {
    mode: 'normal',
    turn: 1,
    hiddenDistance: 1,
    playerDistance: null,
    toleranceSnapshot: null,
    aimDistance: null,
    locked: false,
    ended: false,
    animationId: 0,
    confettiInterval: null
  };

  function randomInitialDistance() {
    const range = config.initialMaxDistance - config.initialMinDistance + 1;
    return Math.floor(Math.random() * range) + config.initialMinDistance;
  }

  function toleranceFor(distance) {
    return Math.max(config.toleranceRatio * distance, config.minTolerance);
  }

  function evaluateCall(d, call) {
    const tolerance = toleranceFor(d);
    const error = Math.abs(call - d);

    if (error <= tolerance) {
      const accuracy = tolerance > 0 ? 1 - (error / tolerance) : 1;
      const forward = Math.max(1, 0.5 * d * accuracy);
      const next = Math.max(0, d - forward);
      return {
        judge: 'フィット',
        kind: 'fit',
        next: next <= config.clearDistanceThreshold ? 0 : next,
        delta: -forward
      };
    }

    const mode = MODES[state.mode];
    let judge;

    if (call < d - tolerance) {
      judge = '近すぎ';
    } else {
      judge = '遠すぎ';
    }

    if (mode.gameOverOnMiss) {
      return {
        judge: 'ゲームオーバー',
        kind: 'nofit',
        next: d,
        delta: 0,
        gameOver: true
      };
    }

    const penaltyMultiplier = judge === '近すぎ'
      ? mode.tooClosePenaltyMultiplier
      : mode.tooFarPenaltyMultiplier;
    const backward = Math.min(penaltyMultiplier * error, d);
    const penaltyDistance = d + backward;

    return {
      judge,
      kind: 'nofit',
      next: penaltyDistance,
      delta: penaltyDistance - d
    };
  }

  function boardWidth() {
    return dom.board.clientWidth;
  }

  function cpuAnchorScreenX() {
    return boardWidth() - config.cpuRightPadding;
  }

  function distanceScale() {
    return Math.max(1, cpuAnchorScreenX() / config.maxDistance);
  }

  function distanceToPixels(distance) {
    return distance * distanceScale();
  }

  function distanceToScreenX(distance) {
    return cpuAnchorScreenX() - distanceToPixels(distance);
  }

  function clampToPlayableX(screenX) {
    return Math.min(Math.max(screenX, 0), cpuAnchorScreenX());
  }

  function renderActors() {
    dom.cpu.style.left = `${cpuAnchorScreenX()}px`;

    if (state.playerDistance === null) {
      dom.player.style.display = 'none';
    } else {
      dom.player.style.display = 'block';
      dom.player.style.left = `${distanceToScreenX(state.playerDistance)}px`;
    }
  }

  function renderAimArrow() {
    if (state.aimDistance === null || state.ended) {
      dom.aimArrow.style.display = 'none';
      dom.aimPerson.style.display = 'none';
      return;
    }

    const aimX = `${distanceToScreenX(state.aimDistance)}px`;

    if (state.playerDistance === null) {
      dom.aimArrow.style.display = 'none';
      dom.aimPerson.style.display = 'block';
      dom.aimPerson.style.left = aimX;
      return;
    }

    dom.aimPerson.style.display = 'none';
    dom.aimArrow.style.display = 'block';
    dom.aimArrow.style.left = aimX;
  }

  function renderMeasureBand() {
    if (state.playerDistance === null) {
      dom.measureBand.style.display = 'none';
      return;
    }

    const cpuX = cpuAnchorScreenX();
    const playerX = distanceToScreenX(state.playerDistance);
    const left = Math.min(cpuX, playerX);
    const width = Math.abs(cpuX - playerX);

    dom.measureBand.style.display = 'block';
    dom.measureBand.style.left = `${left}px`;
    dom.measureBand.style.width = `${width}px`;
  }

  function renderToleranceBand() {
    if (!state.toleranceSnapshot) {
      dom.toleranceBand.style.display = 'none';
      return;
    }

    const tolerance = toleranceFor(state.toleranceSnapshot.distance);
    const near = Math.max(0, state.toleranceSnapshot.distance - tolerance);
    const far = state.toleranceSnapshot.distance + tolerance;
    const left = distanceToScreenX(far);
    const width = distanceToPixels(far - near);

    dom.toleranceBand.style.display = 'block';
    dom.toleranceBand.style.left = `${left}px`;
    dom.toleranceBand.style.width = `${width}px`;
  }

  function renderViewport() {
    renderActors();
    renderAimArrow();
    renderMeasureBand();
    renderToleranceBand();
  }

  function renderHud() {
    dom.turn.textContent = String(state.turn);
  }

  function setCpuPose(pose = 'default') {
    dom.cpu.classList.toggle('pose-fit', pose === 'fit');
    dom.cpu.classList.toggle('pose-touch', pose === 'touch');
  }

  function setResult(text, kind) {
    dom.result.textContent = text;
    dom.result.className = kind;
    dom.result.style.display = 'block';
    setCpuPose(text === 'タッチ成功' ? 'touch' : kind === 'fit' ? 'fit' : 'default');
  }

  function hideResultLater(animationId) {
    setTimeout(() => {
      if (animationId !== state.animationId) return;
      if (!state.ended) {
        dom.result.style.display = 'none';
        setCpuPose();
      }
    }, config.resultHideDelayMs);
  }

  function stopConfettiStream() {
    if (state.confettiInterval) {
      clearInterval(state.confettiInterval);
      state.confettiInterval = null;
    }
  }

  function clearConfetti() {
    stopConfettiStream();

    if (typeof confetti !== 'undefined' && typeof confetti.reset === 'function') {
      confetti.reset();
    }
  }

  function launchConfettiBurst(x, particleCount, spread) {
    confetti({
      particleCount,
      angle: 90,
      spread,
      origin: { x, y: -0.02 },
      gravity: CONFETTI_SETTINGS.INITIAL_GRAVITY,
      ticks: CONFETTI_SETTINGS.INITIAL_TICKS,
      startVelocity: CONFETTI_SETTINGS.START_VELOCITY,
      decay: CONFETTI_SETTINGS.DECAY,
      zIndex: CONFETTI_SETTINGS.Z_INDEX
    });
  }

  function startConfetti() {
    if (typeof confetti === 'undefined') return;

    stopConfettiStream();

    [0.2, 0.5, 0.8].forEach((x) => {
      launchConfettiBurst(x, CONFETTI_SETTINGS.INITIAL_PARTICLE_COUNT, CONFETTI_SETTINGS.INITIAL_SPREAD);
    });

    state.confettiInterval = setInterval(() => {
      confetti({
        particleCount: CONFETTI_SETTINGS.STREAM_PARTICLE_COUNT,
        angle: 90,
        spread: CONFETTI_SETTINGS.STREAM_SPREAD,
        origin: { x: Math.random(), y: -0.02 },
        gravity: CONFETTI_SETTINGS.STREAM_GRAVITY,
        ticks: CONFETTI_SETTINGS.STREAM_TICKS,
        startVelocity: CONFETTI_SETTINGS.START_VELOCITY,
        decay: CONFETTI_SETTINGS.DECAY,
        zIndex: CONFETTI_SETTINGS.Z_INDEX
      });
    }, CONFETTI_SETTINGS.STREAM_INTERVAL_MS);
  }

  function rankForTurns(turns) {
    return RANKS.find((rank) => turns <= rank.maxTurns);
  }

  function rankTitleForMode(rank, mode) {
    return mode === 'normal' ? rank.title : `${rank.title}（${mode.toUpperCase()}）`;
  }

  function showClearModal(turns) {
    const rank = rankForTurns(turns);
    dom.clearRank.textContent = rankTitleForMode(rank, state.mode);
    dom.clearRank.style.color = rank.color;
    dom.clearTurns.textContent = `かかったターン：${turns}`;
    dom.clearModal.classList.add('show');
  }

  function hideClearModal() {
    dom.clearModal.classList.remove('show');
  }

  function createResultImageCanvas() {
    const canvas = document.createElement('canvas');
    canvas.width = 1200;
    canvas.height = 630;

    const context = canvas.getContext('2d');
    context.fillStyle = '#ffffff';
    context.fillRect(0, 0, canvas.width, canvas.height);
    context.strokeStyle = '#1f2937';
    context.lineWidth = 8;
    context.strokeRect(24, 24, canvas.width - 48, canvas.height - 48);

    context.fillStyle = '#1f2937';
    context.font = '900 48px "Noto Sans JP", system-ui, sans-serif';
    const title = '距離感くらいしす！';
    context.fillText(title, 88, 118);
    const subtitleX = 88 + context.measureText(title).width + 24;
    context.fillStyle = '#6b7280';
    context.font = '600 28px system-ui, sans-serif';
    context.fillText('あなたの距離感、それで合ってる？', subtitleX, 118);
    context.strokeStyle = '#9ca3af';
    context.lineWidth = 3;
    context.beginPath();
    context.moveTo(88, 160);
    context.lineTo(canvas.width - 88, 160);
    context.stroke();

    const rank = rankForTurns(state.turn);
    const rankPrefix = '私は';
    const rankTitle = rankTitleForMode(rank, state.mode);
    const rankSuffix = 'です';
    const rankY = 340;
    const rankGap = 18;
    let rankX = 88;

    context.fillStyle = '#1f2937';
    context.font = '700 48px system-ui, sans-serif';
    context.fillText(rankPrefix, rankX, rankY);
    rankX += context.measureText(rankPrefix).width + rankGap;

    context.fillStyle = rank.color;
    context.font = '700 48px system-ui, sans-serif';
    const suffixWidth = context.measureText(rankSuffix).width;
    const maxRankWidth = canvas.width - 88 - rankX - rankGap - suffixWidth;
    let rankFontSize = 78;
    while (rankFontSize > 48) {
      context.font = `900 ${rankFontSize}px "Noto Sans JP", system-ui, sans-serif`;
      if (context.measureText(rankTitle).width <= maxRankWidth) break;
      rankFontSize -= 2;
    }
    context.font = `900 ${rankFontSize}px "Noto Sans JP", system-ui, sans-serif`;
    context.fillText(rankTitle, rankX, rankY);
    rankX += context.measureText(rankTitle).width + rankGap;

    context.fillStyle = '#1f2937';
    context.font = '700 48px system-ui, sans-serif';
    context.fillText(rankSuffix, rankX, rankY);
    context.font = '700 36px system-ui, sans-serif';
    context.fillText(`かかったターン：${state.turn}`, 88, 460);

    return canvas;
  }

  function downloadResultImage(blob) {
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = `distance-game-${state.turn}-turns.png`;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 0);
  }

  async function copyResultImage() {
    if (document.fonts && typeof document.fonts.load === 'function') {
      await document.fonts.load('900 78px "Noto Sans JP"');
    }

    const canvas = createResultImageCanvas();
    const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    if (!blob) return;

    const canCopyImage = window.isSecureContext
      && navigator.clipboard
      && typeof navigator.clipboard.write === 'function'
      && typeof ClipboardItem !== 'undefined';

    if (canCopyImage) {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        dom.saveResultBtn.textContent = 'コピーしました';
        setTimeout(() => {
          dom.saveResultBtn.textContent = '画像をコピー';
        }, 1200);
        return;
      } catch (error) {
        // A permission denial falls back to a downloadable PNG.
      }
    }

    downloadResultImage(blob);
  }

  function setToleranceSnapshot(distance) {
    state.toleranceSnapshot = { distance };
  }

  function resetGame() {
    clearConfetti();
    hideClearModal();
    state.turn = 1;
    state.hiddenDistance = randomInitialDistance();
    state.playerDistance = null;
    state.toleranceSnapshot = null;
    state.aimDistance = null;
    state.locked = false;
    state.ended = false;
    state.animationId += 1;

    dom.result.style.display = 'none';
    setCpuPose();
    renderHud();
    renderViewport();
  }

  function setMode(mode) {
    if (!MODES[mode] || state.mode === mode) return;

    state.mode = mode;
    dom.modeButtons.forEach((button) => {
      const isActive = button.dataset.mode === mode;
      button.classList.toggle('active', isActive);
      button.setAttribute('aria-pressed', String(isActive));
    });
    resetGame();
  }

  function finishGame(message, kind) {
    state.ended = true;
    state.locked = true;
    state.aimDistance = null;
    renderAimArrow();
    setResult(message, kind);
    if (message === 'タッチ成功') {
      showClearModal(state.turn);
      startConfetti();
    }
  }

  function handleBoardClick(e) {
    if (state.locked || state.ended) return;

    const rect = dom.board.getBoundingClientRect();
    const playerScreenX = clampToPlayableX(e.clientX - rect.left);
    const rawCallDistancePx = Math.abs(cpuAnchorScreenX() - playerScreenX);
    const callDistance = rawCallDistancePx / distanceScale();
    const oldDistance = state.hiddenDistance;
    const animationId = state.animationId + 1;
    state.animationId = animationId;

    state.playerDistance = callDistance;
    renderViewport();

    const isTouchAttempt = oldDistance === 0 && rawCallDistancePx <= config.touchRadiusPx;
    let outcome = isTouchAttempt
      ? { judge: 'タッチ成功', kind: 'fit', next: 0, delta: 0 }
      : evaluateCall(oldDistance, callDistance);

    if (outcome.next > config.maxDistance) {
      outcome = {
        ...outcome,
        judge: 'ゲームオーバー',
        kind: 'nofit',
        gameOver: true
      };
    }

    setResult(outcome.judge, outcome.kind);
    state.locked = true;
    state.hiddenDistance = outcome.next;
    setToleranceSnapshot(oldDistance);
    renderViewport();

    if (outcome.judge === 'タッチ成功') {
      finishGame('タッチ成功', 'fit');
      return;
    }

    if (outcome.gameOver) {
      finishGame('ゲームオーバー', 'nofit');
      return;
    }

    state.turn += 1;
    renderHud();

    state.locked = false;
    hideResultLater(animationId);
  }

  function handleBoardMouseMove(e) {
    const rect = dom.board.getBoundingClientRect();
    const aimScreenX = clampToPlayableX(e.clientX - rect.left);
    state.aimDistance = Math.abs(cpuAnchorScreenX() - aimScreenX) / distanceScale();
    renderAimArrow();
  }

  function handleBoardMouseLeave() {
    state.aimDistance = null;
    renderAimArrow();
  }

  dom.board.addEventListener('click', handleBoardClick);
  dom.board.addEventListener('mousemove', handleBoardMouseMove);
  dom.board.addEventListener('mouseleave', handleBoardMouseLeave);
  dom.resetBtn.addEventListener('click', resetGame);
  dom.modeButtons.forEach((button) => {
    button.addEventListener('click', () => setMode(button.dataset.mode));
  });
  dom.saveResultBtn.addEventListener('click', copyResultImage);
  dom.modalResetBtn.addEventListener('click', resetGame);
  window.addEventListener('resize', () => {
    renderViewport();
  });

  requestAnimationFrame(resetGame);
})();
</script>
</body>
</html>
